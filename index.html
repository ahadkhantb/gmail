    const [path, setPath] = useState(window.location.pathname);
    useEffect(() => {
      const onPop = () => setPath(window.location.pathname);
      window.addEventListener('popstate', onPop);
      return () => window.removeEventListener('popstate', onPop);
    }, []);
    const navigate = (to) => { 
      window.history.pushState(null, '', to); 
      setPath(to); 
    };
    return (
      <RouterContext.Provider value={{ path, navigate }}>
        {children}
      </RouterContext.Provider>
    );
  };
  
  const Routes = ({ children }) => {
    const { path } = useRouter();
    let element = null;
    React.Children.forEach(children, child => {

    });
    return element;
  };

    const approveDeposit = async (req) => { 
      try { 
        await db.runTransaction(async (t) => {
          const userRef = db.collection('users').doc(req.userId);
          const userSnap = await t.get(userRef);
          if(!userSnap.exists) throw new Error('User not found');
          t.update(userRef, { balance: userSnap.data().balance + req.amount });
          t.update(db.collection('depositRequests').doc(req.id), { status: 'approved' });
        }); 
      } catch(e) {

      } 
    };
    
    return (

    const { navigate } = useRouter();
    const [step, setStep] = useState(1);
    const [firstName, setFirstName] = useState('');
    const [lastName, setLastName] = useState('');
    const [password, setPassword] = useState('');
    
    const genEmail = () => `${firstName.toLowerCase().replace(/[^a-z]/g,'')}${lastName.toLowerCase().replace(/[^a-z]/g,'')}${Math.floor(Math.random()*1000)}@gmail.com`;
    
    const create = async () => {
      const email = genEmail();
      try { 
        await db.collection('gmailHistory').add({ 
          userId: user.uid, email, password, firstName, lastName, createdAt: serverTimestamp() 
        }); 
        navigate('/dashboard'); 
      } catch(e) { 
        alert(e.message); 
      }
    };
    
    return (
      <div className="min-h-screen bg-black text-white p-6">
        <div className="max-w-md mx-auto">
          <h1 className="text-2xl mb-6">Create Google Account</h1>
          {step === 1 && (
            <>
              <input className="w-full bg-transparent border p-4 rounded mb-3" placeholder="First name" value={firstName} onChange={e => setFirstName(e.target.value)} />
              <input className="w-full bg-transparent border p-4 rounded mb-3" placeholder="Last name" value={lastName} onChange={e => setLastName(e.target.value)} />
              <button onClick={() => setStep(2)} className="bg-[#a8c7fa] text-black px-6 py-3 rounded">Next</button>
            </>
          )}
          {step === 2 && (
            <>
              <input type="password" className="w-full bg-transparent border p-4 rounded mb-3" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} />
              <button onClick={create} className="bg-[#a8c7fa] text-black px-6 py-3 rounded">Create Account</button>
            </>
          )}
        </div>
      </div>
    );
  };

  // ---------- App Root ----------
  const App = () => (
    <Router>
      <AuthProvider>
        <Routes>
          <Route path="/" element={<Navigate to="/login" />} />
          <Route path="/login" element={<Login />} />
          <Route path="/signup" element={<Signup />} />
          <Route path="/forgot-password" element={<ForgotPassword />} />
          <Route path="/dashboard" element={<Dashboard />} />
          <Route path="/admin" element={<Admin />} />
          <Route path="/create-gmail" element={<CreateGmail />} />
        </Routes>
      </AuthProvider>
    </Router>
  );

  // Render the app
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <React.StrictMode>
      <App />
    </React.StrictMode>
  );
</script>
</body>
</html>
