                  {isPremiumActive && (
                    <button 
                      onClick={() => navigate('/create-gmail')}
                      className="px-6 py-2 bg-primary-600 text-white rounded-xl font-semibold hover:bg-primary-700 transition-colors"
                    >
                      Create Your First Account
                    </button>
                  )}
                </div>
              )}
            </div>
          </div>
        </main>
        
        {/* Deposit Modal */}
        {showDeposit && (
          <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in" onClick={() => setShowDeposit(false)}>
            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl animate-scale-in" onClick={e => e.stopPropagation()}>
              <div className="flex justify-between items-center mb-6">
                <div>
                  <h3 className="text-2xl font-bold text-gray-900">Deposit Funds</h3>
                  <p className="text-gray-500 text-sm mt-1">Add money to your wallet</p>
                </div>
                <button 
                  onClick={() => setShowDeposit(false)}
                  className="p-2 hover:bg-gray-100 rounded-xl transition-colors"
                >
                  <Icon d={icons.X} className="w-5 h-5 text-gray-500" />
                </button>
              </div>
              
              <form onSubmit={deposit} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Payment Method</label>
                  <select 
                    value={selectedMethod} 
                    onChange={e => setSelectedMethod(e.target.value)} 
                    className="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-4 focus:ring-primary-500/20 transition-all"
                    required
                  >
                    <option value="">Select payment method</option>
                    {paymentMethods.map(m => (
                      <option key={m.id} value={m.name}>{m.name}</option>
                    ))}
                  </select>
                </div>
                
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Amount ($)</label>
                  <div className="relative">
                    <Icon d={icons.DollarSign} className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" />
                    <input 
                      type="number" 
                      min="1"
                      step="0.01"
                      placeholder="Enter amount"
                      value={amount} 
                      onChange={e => setAmount(e.target.value)} 
                      className="w-full pl-12 pr-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-4 focus:ring-primary-500/20 transition-all"
                      required
                    />
                  </div>
                </div>
                
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Transaction ID</label>
                  <input 
                    placeholder="Enter transaction ID"
                    value={trxId} 
                    onChange={e => setTrxId(e.target.value)} 
                    className="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-primary-500 focus:ring-4 focus:ring-primary-500/20 transition-all"
                    required
                  />
                </div>
                
                {selectedMethod && paymentMethods.find(m => m.name === selectedMethod)?.instructions && (
                  <div className="bg-primary-50 border border-primary-200 rounded-xl p-4">
                    <p className="text-sm text-primary-800 font-medium mb-2">Payment Instructions:</p>
                    <p className="text-sm text-primary-700">{paymentMethods.find(m => m.name === selectedMethod).instructions}</p>
                  </div>
                )}
                
                <button 
                  type="submit" 
                  className="w-full bg-gradient-to-r from-primary-600 to-purple-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300"
                >
                  Submit Deposit Request
                </button>
              </form>
            </div>
          </div>
        )}
        
        {/* Premium Upgrade Modal */}
        {showPremium && (
          <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-fade-in" onClick={() => setShowPremium(false)}>
            <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl animate-scale-in" onClick={e => e.stopPropagation()}>
              <div className="text-center mb-6">
                <div className="w-20 h-20 mx-auto bg-gradient-to-br from-premium-gold to-orange-500 rounded-2xl flex items-center justify-center shadow-premium mb-4 animate-float">
                  <Icon d={icons.Crown} className="w-10 h-10 text-white" />
                </div>
                <h3 className="text-2xl font-bold text-gray-900 mb-2">Upgrade to Premium</h3>
                <p className="text-gray-600">Unlock all premium features</p>
              </div>
              
              <div className="space-y-3 mb-6">
                {[
                  'Create unlimited Gmail accounts',
                  'View full account history',
                  'Priority support',
                  'Early access to new features'
                ].map((feature, i) => (
                  <div key={i} className="flex items-center gap-3">
                    <div className="w-5 h-5 bg-success/10 rounded-full flex items-center justify-center">
                      <Icon d={icons.CheckCircle} className="w-3 h-3 text-success" />
                    </div>
                    <span className="text-gray-700">{feature}</span>
                  </div>
                ))}
              </div>
              
              <div className="bg-gradient-to-br from-premium-gold-light to-amber-50 rounded-2xl p-6 mb-6">
                <div className="text-center">
                  <p className="text-sm text-gray-600 mb-2">Monthly Subscription</p>
                  <p className="text-5xl font-black text-gray-900">$6</p>
                  <p className="text-sm text-gray-500 mt-1">per month</p>
                </div>
              </div>
              
              <button 
                onClick={buyPremium}
                className="w-full bg-gradient-to-r from-premium-gold to-orange-500 text-white py-4 rounded-xl font-bold text-lg shadow-premium hover:shadow-xl transform hover:-translate-y-0.5 transition-all duration-300"
              >
                Upgrade Now
              </button>
              
              <p className="text-center text-xs text-gray-500 mt-4">
                Cancel anytime. Premium features will remain active until the end of billing period.
              </p>
            </div>
          </div>
        )}
      </div>
    );
  };

  const Admin = () => {
    const { userData } = useAuth();
    const { navigate } = useRouter();
    const [deposits, setDeposits] = useState([]);
    const [activeTab, setActiveTab] = useState('deposits');
    const [toast, setToast] = useState(null);
    
    useEffect(() => { 
      if(userData?.role !== 'admin') navigate('/dashboard'); 
    }, [userData]);
    
    useEffect(() => { 
      const q = db.collection('depositRequests').where('status', '==', 'pending').orderBy('createdAt', 'desc');
      return q.onSnapshot(s => setDeposits(s.docs.map(d => ({ id: d.id, ...d.data() })))); 
    }, []);
    
    const approveDeposit = async (req) => { 
      try { 
        await db.runTransaction(async (t) => {
          const userRef = db.collection('users').doc(req.userId);
          const userSnap = await t.get(userRef);
          if(!userSnap.exists) throw new Error('User not found');
          t.update(userRef, { balance: userSnap.data().balance + req.amount });
          t.update(db.collection('depositRequests').doc(req.id), { 
            status: 'approved',
            approvedAt: serverTimestamp()
          });
        }); 
        setToast({ message: `Deposit of $${req.amount} approved!`, type: 'success' });
      } catch(e) { 
        setToast({ message: e.message, type: 'error' });
      } 
    };
    
    const rejectDeposit = async (reqId) => {
      try {
        await db.collection('depositRequests').doc(reqId).update({ 
          status: 'rejected',
          rejectedAt: serverTimestamp()
        });
        setToast({ message: 'Deposit request rejected', type: 'success' });
      } catch(e) {
        setToast({ message: e.message, type: 'error' });
      }
    };
    
    return (
      <div className="min-h-screen bg-gradient-to-br from-gray-50 via-white to-gray-100">
        {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        
        <header className="bg-white/80 backdrop-blur-xl border-b border-gray-200 sticky top-0 z-30">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex justify-between items-center h-16">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-gradient-to-br from-primary-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg">
                  <Icon d={icons.Shield} className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h1 className="text-xl font-bold text-gray-900">Admin Panel</h1>
                  <p className="text-xs text-gray-500">Manage your platform</p>
                </div>
              </div>
              <Link to="/dashboard" className="px-4 py-2 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition-colors">
                Back to Dashboard
              </Link>
            </div>
          </div>
        </header>
        
        <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
          <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div className="border-b border-gray-200">
              <nav className="flex gap-8 px-6">
                {['deposits', 'users', 'settings'].map(tab => (
                  <button
                    key={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`py-4 font-medium capitalize transition-all duration-300 border-b-2 ${
                      activeTab === tab 
                        ? 'border-primary-600 text-primary-600' 
                        : 'border-transparent text-gray-500 hover:text-gray-700'
                    }`}
                  >
                    {tab}
                  </button>
                ))}
              </nav>
            </div>
            
            <div className="p-6">
              {activeTab === 'deposits' && (
                <div>
                  <h2 className="text-lg font-bold text-gray-900 mb-4">Pending Deposits ({deposits.length})</h2>
                  {deposits.length ? (
                    <div className="space-y-3">
                      {deposits.map(r => (
                        <div key={r.id} className="bg-gray-50 rounded-xl p-4 flex items-center justify-between hover:bg-gray-100 transition-colors">
                          <div className="flex-1">
                            <div className="flex items-center gap-3 mb-2">
                              <div className="w-10 h-10 bg-primary-100 rounded-full flex items-center justify-center">
                                <Icon d={icons.User} className="w-5 h-5 text-primary-600" />
                              </div>
                              <div>
                                <p className="font-medium text-gray-900">{r.userEmail}</p>
                                <p className="text-sm text-gray-500">ID: {r.transactionId}</p>
                              </div>
                            </div>
                            <div className="flex items-center gap-4 ml-13">
                              <span className="text-lg font-bold text-gray-900">${r.amount}</span>
                              <span className="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-medium">
                                {r.method}
                              </span>
                              <span className="text-xs text-gray-500">
                                {r.createdAt?.toDate?.().toLocaleString() || 'Just now'}
                              </span>
                            </div>
                          </div>
                          <div className="flex gap-2">
                            <button 
                              onClick={() => approveDeposit(r)} 
                              className="px-4 py-2 bg-success text-white rounded-lg font-medium hover:bg-success/90 transition-colors"
                            >
                              Approve
                            </button>
                            <button 
                              onClick={() => rejectDeposit(r.id)} 
                              className="px-4 py-2 bg-danger text-white rounded-lg font-medium hover:bg-danger/90 transition-colors"
                            >
                              Reject
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="text-center py-12">
                      <div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <Icon d={icons.CheckCircle} className="w-8 h-8 text-gray-400" />
                      </div>
                      <p className="text-gray-500">No pending deposit requests</p>
                    </div>
                  )}
                </div>
              )}
              
              {activeTab === 'users' && (
                <div className="text-center py-12">
                  <Icon d={icons.Users} className="w-12 h-12 text-gray-400 mx-auto mb-4" />
                  <p className="text-gray-500">User management coming soon</p>
                </div>
              )}
              
              {activeTab === 'settings' && (
                <div className="text-center py-12">
                  <Icon d={icons.Settings} className="w-12 h-12 text-gray-400 mx-auto mb-4" />
                  <p className="text-gray-500">Platform settings coming soon</p>
                </div>
              )}
            </div>
          </div>
        </main>
      </div>
    );
  };

  const CreateGmail = () => {
    const { user, userData } = useAuth();
    const { navigate } = useRouter();
    const [step, setStep] = useState(1);
    const [firstName, setFirstName] = useState('');
    const [lastName, setLastName] = useState('');
    const [password, setPassword] = useState('');
    const [loading, setLoading] = useState(false);
    
    useEffect(() => {
      if(userData && !userData.isPremium) {
        navigate('/dashboard');
      }
    }, [userData]);
    
    const genEmail = () => `${firstName.toLowerCase().replace(/[^a-z]/g,'')}${lastName.toLowerCase().replace(/[^a-z]/g,'')}${Math.floor(Math.random()*1000)}@gmail.com`;
    
    const create = async () => {
      if(!password || password.length < 8) {
        alert('Password must be at least 8 characters');
        return;
      }
      
      setLoading(true);
      const email = genEmail();
      try { 
        await db.collection('gmailHistory').add({ 
          userId: user.uid, 
          email, 
          password, 
          firstName, 
          lastName, 
          createdAt: serverTimestamp() 
        }); 
        navigate('/dashboard'); 
      } catch(e) { 
        alert(e.message); 
      } finally {
        setLoading(false);
      }
    };
    
    return (
      <div className="min-h-screen bg-gradient-to-br from-gray-900 to-gray-800 flex items-center justify-center p-4">
        <div className="max-w-md w-full">
          {/* Google Style Header */}
          <div className="text-center mb-8">
            <div className="inline-flex items-center gap-2 mb-4">
              <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg">
                <span className="text-2xl font-bold bg-gradient-to-r from-blue-500 to-green-500 bg-clip-text text-transparent">G</span>
              </div>
              <span className="text-2xl text-white font-medium">Google</span>
            </div>
            <h1 className="text-3xl text-white font-light mb-2">Create your Google Account</h1>
            <p className="text-gray-400">Step {step} of 2</p>
          </div>
          
          {/* Form Card */}
          <div className="bg-white rounded-3xl p-8 shadow-2xl">
            {step === 1 && (
              <div className="space-y-4 animate-fade-in">
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">First name</label>
                    <input 
                      className="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all"
                      placeholder="First name"
                      value={firstName} 
                      onChange={e => setFirstName(e.target.value)} 
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2">Last name</label>
                    <input 
                      className="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all"
                      placeholder="Last name"
                      value={lastName} 
                      onChange={e => setLastName(e.target.value)} 
                    />
                  </div>
                </div>
                
                <button 
                  onClick={() => setStep(2)}
                  disabled={!firstName || !lastName}
                  className="w-full bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed mt-6"
                >
                  Next
                </button>
              </div>
            )}
            
            {step === 2 && (
              <div className="space-y-4 animate-fade-in">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Email address</label>
                  <div className="px-4 py-3 bg-gray-100 border-2 border-gray-200 rounded-xl text-gray-600">
                    {firstName && lastName ? genEmail() : 'Enter your name first'}
                  </div>
                </div>
                
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Password</label>
                  <input 
                    type="password"
                    className="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 transition-all"
                    placeholder="Create a strong password"
                    value={password} 
                    onChange={e => setPassword(e.target.value)} 
                  />
                  <p className="text-xs text-gray-500 mt-1">Use 8 or more characters with a mix of letters, numbers & symbols</p>
                </div>
                
                <div className="flex gap-3 mt-6">
                  <button 
                    onClick={() => setStep(1)}
                    className="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition-colors"
                  >
                    Back
                  </button>
                  <button 
                    onClick={create}
                    disabled={loading || !password}
                    className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    {loading ? 'Creating...' : 'Create Account'}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  // ---------- App Root ----------
  const App = () => (
    <Router>
      <AuthProvider>
        <Routes>
          <Route path="/" element={<Navigate to="/login" />} />
          <Route path="/login" element={<Login />} />
          <Route path="/signup" element={<Signup />} />
          <Route path="/forgot-password" element={<ForgotPassword />} />
          <Route path="/dashboard" element={<Dashboard />} />
          <Route path="/admin" element={<Admin />} />
          <Route path="/create-gmail" element={<CreateGmail />} />
        </Routes>
      </AuthProvider>
    </Router>
  );

  // Render the app
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <React.StrictMode>
      <App />
    </React.StrictMode>
  );
</script>
</body>
  </html>
